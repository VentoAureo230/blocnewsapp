name: blocnewsapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Compare dart objects
  equatable: ^2.0.5

  # Service locator
  get_it: ^9.2.1

  # Date formatting
  intl: ^0.20.2

  # Local database
  sqflite: ^2.4.2
  path: ^1.9.1

  # Make request to api
  retrofit: ^4.9.0
  logger: ^2.6.0  # for logging purpose
  json_annotation: ^4.9.0

  # Hooks : manage lifecycle of stateful widgets
  flutter_hooks: ^0.21.3

  # Image caching
  cached_network_image: ^3.4.1
  flutter_dotenv: ^6.0.0
  dio: ^5.9.2
  bloc: ^9.2.0
  rxdart: ^0.28.0
  flutter_secure_storage: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  retrofit_generator: ^10.2.3
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - .env

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: SourceCodePro
      fonts:
        - asset: fonts/SourceCodePro-Bold.ttf
        - asset: fonts/SourceCodePro-Italic.ttf
        - asset: fonts/SourceCodePro-Regular.ttf
          style: italic
    - family: Coolvetica
      fonts:
        - asset: fonts/Coolvetica-Regular.ttf
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
