name: blocnewsapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^9.1.1

  # Compare dart objects
  equatable: ^2.0.5

  # Service locator
  get_it: ^9.2.1

  # Date formatting
  intl: ^0.20.2

  # Local database
  floor: ^1.5.0

  # Make request to api
  retrofit: ^4.9.0
  logger: ^2.6.0  # for logging purpose
  json_annotation: ^4.9.0

  # Hooks : manage lifecycle of stateful widgets
  flutter_hooks: ^0.21.3

  # Image caching
  cached_network_image: ^3.4.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  retrofit_generator: ^10.2.3
  build_runner: ^2.13.1
  json_serializable: ^6.13.1

flutter:
  uses-material-design: true

